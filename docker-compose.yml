services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: magento_app
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    environment:
      # New Relic PHP agent (APM). Values come from a git-ignored .env file.
      # The license key is required; the rest have sensible defaults.
      NEW_RELIC_LICENSE_KEY: "${NEW_RELIC_LICENSE_KEY:-}"
      NEW_RELIC_APPNAME: "${NEW_RELIC_APPNAME:-Magento 2.4.9 (Local Docker)}"
      NEW_RELIC_ENABLED: "${NEW_RELIC_ENABLED:-true}"
      NEW_RELIC_DISTRIBUTED_TRACING_ENABLED: "${NEW_RELIC_DISTRIBUTED_TRACING_ENABLED:-true}"
      # EU data center only: uncomment in .env -> NEW_RELIC_HOST=collector.eu.nr-data.net
      NEW_RELIC_HOST: "${NEW_RELIC_HOST:-}"
    depends_on:
      - db
      - opensearch
    networks: [magento]

  db:
    image: mariadb:11.4
    container_name: magento_db
    environment:
      MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: "1"
      MARIADB_DATABASE: magento249
    command: --max_allowed_packet=128M --log_bin_trust_function_creators=1
    ports:
      - "3308:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks: [magento]

  opensearch:
    image: opensearchproject/opensearch:3.3.2
    container_name: magento_opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile:  { soft: 65536, hard: 65536 }
    ports:
      - "9201:9200"
    volumes:
      - osdata:/usr/share/opensearch/data
    networks: [magento]

volumes:
  dbdata:
  osdata:

networks:
  magento:
    driver: bridge
